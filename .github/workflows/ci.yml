name: CI Pipeline

on:
  push:
    branches: [dev, main, "feature/*"]
  pull_request:
    branches: [dev, main]

jobs:
  build-and-test-services:
    name: Build & Test Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Build and test Maven modules
        run: ./backend/mvnw -B -f pom.xml clean verify -Dspring.profiles.active=test

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: [build-and-test-services, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create CI env file
        run: echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env

      - name: Build Docker images
        run: docker compose -f docker-compose-microservices.yml build
