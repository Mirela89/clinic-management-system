services:
  postgres:
    image: postgres:16-alpine
    container_name: medicare-postgres
    environment:
      POSTGRES_DB: medicare_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medicare_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: medicare-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medicare_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8081:8081"

volumes:
  postgres_data:
